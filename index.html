<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W-AI MVP • 사장님 자동화 도구</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#F8F9FB]">
    <div class="max-w-5xl mx-auto p-6">
        
        <!-- Header -->
        <div class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-x-3">
                <div class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center">
                    <span class="text-white font-bold text-2xl">W</span>
                </div>
                <span class="font-bold text-3xl">W-AI</span>
            </div>
            <div class="text-sm text-slate-500">MVP 버전 • 비용 0원</div>
        </div>

        <!-- 상황 입력 -->
        <div class="bg-white border rounded-3xl p-8 mb-8">
            <h2 class="text-2xl font-bold mb-2">현재 상황을 알려주세요</h2>
            <p class="text-slate-500 mb-6">상황을 입력하면 맞춤 마케팅을 추천해드려요</p>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <div>
                    <label class="block text-sm mb-2">오늘 날씨</label>
                    <select id="weather" class="w-full border rounded-2xl px-4 py-3">
                        <option value="비">비</option>
                        <option value="맑음">맑음</option>
                        <option value="폭염">폭염</option>
                        <option value="미세먼지">미세먼지</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm mb-2">현재 상황 (자유 입력)</label>
                    <input id="situation" type="text" placeholder="예: 손님이 적어요, 주말인데 매출이 떨어져요"
                           class="w-full border rounded-2xl px-4 py-3">
                </div>
            </div>

            <button onclick="generateRecommendation()" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-semibold text-lg">
                AI가 맞춤 마케팅 추천받기
            </button>
        </div>

        <!-- 추천 결과 -->
        <div id="recommendation-result" class="hidden bg-white border rounded-3xl p-8 mb-8">
            <h3 class="font-bold text-xl mb-4">AI 추천 마케팅</h3>
            <div id="recommendation-content" class="mb-6 whitespace-pre-wrap"></div>
            
            <div class="flex gap-x-3">
                <button onclick="executeMarketing()" 
                        class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white py-3 rounded-2xl font-semibold">
                    이 마케팅 실행하기
                </button>
                <button onclick="regenerate()" 
                        class="flex-1 bg-slate-200 hover:bg-slate-300 text-slate-700 py-3 rounded-2xl font-semibold">
                    다시 추천받기
                </button>
            </div>
        </div>

        <!-- 실행 후 효과 -->
        <div id="execution-result" class="hidden bg-white border rounded-3xl p-8 mb-8">
            <h3 class="font-bold text-xl mb-4">실행 결과</h3>
            <div id="execution-content" class="mb-6"></div>
            
            <button onclick="resetAll()" 
                    class="w-full bg-slate-800 text-white py-3 rounded-2xl font-semibold">
                처음으로 돌아가기
            </button>
        </div>

        <!-- 최근 실행 내역 -->
        <div class="bg-white border rounded-3xl p-8">
            <h3 class="font-bold text-xl mb-4">최근 실행 내역</h3>
            <div id="history-list" class="space-y-3 text-sm"></div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
