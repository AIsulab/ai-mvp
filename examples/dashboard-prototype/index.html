<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W-AI • 사장님 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#F8F9FB] text-slate-800">

    <div class="flex h-screen">
        
        <!-- Sidebar -->
        <div class="w-64 bg-white border-r border-slate-200 flex flex-col">
            <div class="px-6 py-5 border-b">
                <div class="flex items-center gap-x-3">
                    <div class="w-9 h-9 bg-blue-600 rounded-2xl flex items-center justify-center">
                        <span class="text-white font-bold text-2xl">W</span>
                    </div>
                    <span class="font-bold text-2xl tracking-tight">W-AI</span>
                </div>
            </div>

            <div class="p-3 flex-1">
                <div onclick="showSection('dashboard')" class="sidebar-item active flex items-center gap-x-3 px-4 py-3 rounded-2xl mb-1 cursor-pointer">
                    <i class="fa-solid fa-th-large w-5"></i>
                    <span>대시보드</span>
                </div>
                <div onclick="showSection('weather')" class="sidebar-item flex items-center gap-x-3 px-4 py-3 rounded-2xl mb-1 cursor-pointer">
                    <i class="fa-solid fa-cloud-sun w-5"></i>
                    <span>날씨 마케팅</span>
                </div>
                <div onclick="showSection('sns')" class="sidebar-item flex items-center gap-x-3 px-4 py-3 rounded-2xl mb-1 cursor-pointer">
                    <i class="fa-solid fa-share-alt w-5"></i>
                    <span>SNS 콘텐츠</span>
                </div>
                <div onclick="showSection('review')" class="sidebar-item flex items-center gap-x-3 px-4 py-3 rounded-2xl mb-1 cursor-pointer">
                    <i class="fa-solid fa-comments w-5"></i>
                    <span>리뷰 답변</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-1 overflow-auto">
            <div class="h-16 bg-white border-b px-8 flex items-center justify-between">
                <div class="text-sm text-slate-500">2026년 6월 25일 목요일</div>
                <div class="px-3 py-1.5 bg-white border rounded-2xl text-sm flex items-center gap-x-2">
                    <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                    <span>기상청 API 연동 중</span>
                </div>
            </div>

            <div class="p-8">
                <!-- Greeting -->
                <div class="mb-8">
                    <h1 class="text-3xl font-bold">안녕하세요, 사장님 👋</h1>
                    <p class="text-slate-500">W-AI가 오늘도 마케팅을 도와드릴게요.</p>
                </div>

                <!-- Stats -->
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                    <div class="bg-white border rounded-3xl p-5 modern-card">
                        <div class="text-sm text-slate-500">AI 생성 문구</div>
                        <div class="text-4xl font-bold mt-1">12건</div>
                    </div>
                    <div class="bg-white border rounded-3xl p-5 modern-card">
                        <div class="text-sm text-slate-500">실시간 API</div>
                        <div class="text-4xl font-bold mt-1">84건</div>
                    </div>
                    <div class="bg-white border rounded-3xl p-5 modern-card">
                        <div class="text-sm text-slate-500">이번 달 콘텐츠</div>
                        <div class="text-4xl font-bold mt-1">84건</div>
                    </div>
                    <div class="bg-white border rounded-3xl p-5 modern-card">
                        <div class="text-sm text-slate-500">지원금 매칭</div>
                        <div class="text-4xl font-bold mt-1">3건</div>
                    </div>
                </div>

                <!-- Quick Actions -->
                <h3 class="font-semibold mb-4">빠른 실행</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                    <div onclick="showSection('weather')" class="bg-white border rounded-3xl p-5 cursor-pointer modern-card">
                        <i class="fa-solid fa-cloud-sun text-3xl text-sky-500 mb-2"></i>
                        <div class="font-semibold">날씨 마케팅 생성</div>
                    </div>
                    <div onclick="showSection('sns')" class="bg-white border rounded-3xl p-5 cursor-pointer modern-card">
                        <i class="fa-solid fa-share-alt text-3xl text-purple-500 mb-2"></i>
                        <div class="font-semibold">SNS 콘텐츠 만들기</div>
                    </div>
                    <div onclick="showSection('review')" class="bg-white border rounded-3xl p-5 cursor-pointer modern-card">
                        <i class="fa-solid fa-comments text-3xl text-orange-500 mb-2"></i>
                        <div class="font-semibold">리뷰 답변 작성</div>
                    </div>
                </div>

                <!-- Recent Activity -->
                <h3 class="font-semibold mb-4">최근 생성 내역</h3>
                <div class="bg-white border rounded-3xl p-5 space-y-3 text-sm">
                    <div class="flex justify-between"><span>날씨 마케팅 • 비 오는 날</span> <span class="text-emerald-500">방금 전</span></div>
                    <div class="flex justify-between"><span>SNS 콘텐츠 • 여름 세트</span> <span class="text-emerald-500">14분 전</span></div>
                    <div class="flex justify-between"><span>리뷰 답변 • 3건</span> <span class="text-emerald-500">42분 전</span></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Weather Modal -->
    <div id="weather-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-white rounded-3xl w-full max-w-md mx-4 p-8">
            <h3 class="text-xl font-bold mb-6">날씨 마케팅 생성</h3>
            
            <select id="weather-select" class="w-full border rounded-2xl px-4 py-3 mb-4">
                <option value="비">비</option>
                <option value="맑음">맑음</option>
                <option value="폭염">폭염</option>
                <option value="미세먼지">미세먼지</option>
            </select>

            <button onclick="generateWeatherMarketing()" class="w-full bg-blue-600 text-white py-3 rounded-2xl font-semibold mb-4">
                마케팅 문구 생성
            </button>

            <div id="weather-result" class="hidden bg-slate-50 p-5 rounded-2xl whitespace-pre-wrap mb-4"></div>

            <button onclick="closeModal()" class="w-full text-slate-500">닫기</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
